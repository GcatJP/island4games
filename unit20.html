<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Adventure Island Match-Up!</title>
    <style>
      :root {
        --sand: #f6e3b4;
        --sand-dark: #e8c988;
        --ocean-deep: #0e6e6e;
        --ocean: #0a9eb8; /* was dark teal, now dark green */
        --ocean-light: #1ec8d4; /* was light teal, now light green */
        --coral: #ff7b54;
        --sun: #ffd23f;
        --ink: #0b3d3a;
        --white: #fffdf8;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 100%;
        height: 100dvh;
        overflow: hidden;
        background: linear-gradient(to bottom, #30b0c7, #40c8e0);
        font-family: "Trebuchet MS", "Verdana", sans-serif;
        color: var(--ink);
      }

      /* decorative */
      .sun {
        position: absolute;
        top: max(10px, env(safe-area-inset-top, 10px));
        right: clamp(10px, 4vw, 40px);
        width: clamp(40px, 8vw, 72px);
        height: clamp(40px, 8vw, 72px);
        border-radius: 50%;
        background: radial-gradient(circle at 35% 35%, #ffefae, var(--sun) 70%);
        box-shadow: 0 0 24px 8px rgba(255, 210, 63, 0.5);
        pointer-events: none;
        z-index: 0;
      }
      .cloud {
        position: absolute;
        background: rgba(255, 255, 255, 0.82);
        border-radius: 50px;
        pointer-events: none;
        z-index: 0;
      }
      .cloud::before,
      .cloud::after {
        content: "";
        position: absolute;
        background: inherit;
        border-radius: 50%;
      }
      .cloud1 {
        top: 5%;
        left: 5%;
        width: 80px;
        height: 26px;
      }
      .cloud1::before {
        width: 40px;
        height: 40px;
        top: -18px;
        left: 8px;
      }
      .cloud1::after {
        width: 30px;
        height: 30px;
        top: -12px;
        left: 42px;
      }
      .cloud2 {
        top: 12%;
        left: 55%;
        width: 60px;
        height: 20px;
        opacity: 0.75;
      }
      .cloud2::before {
        width: 30px;
        height: 30px;
        top: -14px;
        left: 6px;
      }
      .cloud2::after {
        width: 22px;
        height: 22px;
        top: -8px;
        left: 32px;
      }

      /* layout */
      .wrap {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        height: 100dvh;
        padding: max(6px, env(safe-area-inset-top, 6px))
          max(10px, env(safe-area-inset-right, 10px))
          max(8px, env(safe-area-inset-bottom, 8px))
          max(10px, env(safe-area-inset-left, 10px));
        gap: 0;
      }

      /* header row */
      .header {
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        padding: 4px 0 6px;
        gap: clamp(6px, 2vw, 14px);
      }

      h1 {
        font-family: "Chalkboard SE", "Comic Sans MS", cursive, sans-serif;
        font-size: clamp(16px, 5.5vw, 50px);
        color: var(--sun);
        -webkit-text-stroke: 1.5px var(--ocean-deep);
        white-space: nowrap;
      }

      .pill {
        background: var(--white);
        border: 2.5px solid var(--ocean);
        border-radius: 999px;
        padding: 3px 9px;
        font-weight: bold;
        font-size: clamp(10px, 2vw, 14px);
        white-space: nowrap;
        color: var(--ocean-deep);
      }

      .reset-btn {
        background: var(--coral);
        color: var(--white);
        border: none;
        border-radius: 999px;
        padding: 4px 12px;
        font-size: clamp(10px, 2vw, 14px);
        white-space: nowrap;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 3px 0 #c2522f;
        font-family: inherit;
        flex-shrink: 0;
        text-decoration: none;
      }
      .reset-btn:active {
        transform: translateY(2px);
        box-shadow: none;
      }

      /* grid fills remaining space */
      .grid {
        flex: 1;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        grid-template-rows: repeat(4, 1fr);
        gap: clamp(5px, 1.5vw, 12px);
        min-height: 0;
      }

      /* cards use 100% of their grid cell */
      .card {
        position: relative;
        width: 100%;
        height: 100%;
        perspective: 800px;
        cursor: pointer;
      }
      .card.locked {
        cursor: default;
      }

      .card-inner {
        position: absolute;
        inset: 0;
        transition: transform 0.42s cubic-bezier(0.4, 0.2, 0.2, 1);
        transform-style: preserve-3d;
      }
      .card.flipped .card-inner,
      .card.matched .card-inner {
        transform: rotateY(180deg);
      }

      .face {
        position: absolute;
        inset: 0;
        border-radius: clamp(8px, 2vw, 14px);
        display: flex;
        align-items: center;
        justify-content: center;
        backface-visibility: hidden;
        overflow: hidden;
      }
      .face-back {
        background: repeating-linear-gradient(
          135deg,
          var(--ocean) 0px,
          var(--ocean) 10px,
          var(--ocean-light) 10px,
          var(--ocean-light) 20px
        );
        border: 2.5px solid var(--white);
        box-shadow: 0 3px 0 rgba(0, 0, 0, 0.14);
        color: var(--white);
        font-family: "Chalkboard SE", "Comic Sans MS", cursive;
        font-weight: bold;
        font-size: clamp(18px, 7vw, 46px);
        -webkit-text-stroke: 1px var(--ocean-deep);
      }
      .face-back::after {
        content: "";
        font-family: "Chalkboard SE", "Comic Sans MS", cursive;
        font-weight: bold;
        font-size: clamp(18px, 4.5vw, 28px);
        color: var(--white);
        -webkit-text-stroke: 1px var(--ocean-deep);
      }
      .face-front {
        background: var(--white);
        border: 2.5px solid var(--white);
        transform: rotateY(180deg);
        box-shadow: 0 3px 0 rgba(0, 0, 0, 0.1);
        padding: 8%;
        flex-direction: column;
        gap: 4px;
      }
      .face-front img {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
      }
      .face-front .word {
        font-family: "Chalkboard SE", "Comic Sans MS", cursive;
        font-weight: bold;
        font-size: clamp(10px, 4vw, 30px);
        color: var(--ocean-deep);
        text-align: center;
        line-height: 1.1;
      }

      .card.matched .face-front {
        border-color: var(--sun);
        background: linear-gradient(135deg, #fffbea, #fff1c4);
        animation: glow 1s ease-in-out infinite alternate;
      }
      @keyframes glow {
        from {
          box-shadow:
            0 0 6px 0 rgba(255, 210, 63, 0.6),
            0 3px 0 rgba(0, 0, 0, 0.1);
        }
        to {
          box-shadow:
            0 0 16px 6px rgba(255, 210, 63, 0.85),
            0 3px 0 rgba(0, 0, 0, 0.1);
        }
      }
      .card.wrong .card-inner {
        animation: shake 0.4s;
      }
      @keyframes shake {
        0%,
        100% {
          transform: rotateY(180deg) translateX(0);
        }
        25% {
          transform: rotateY(180deg) translateX(-5px);
        }
        75% {
          transform: rotateY(180deg) translateX(5px);
        }
      }

      .sparkle {
        position: absolute;
        font-size: 16px;
        pointer-events: none;
        animation: pop 0.9s ease-out forwards;
        z-index: 5;
      }
      @keyframes pop {
        0% {
          opacity: 1;
          transform: translate(0, 0) scale(0.6) rotate(0deg);
        }
        100% {
          opacity: 0;
          transform: translate(var(--dx), var(--dy)) scale(1.3) rotate(180deg);
        }
      }

      .rotate-msg {
        display: none;
        position: fixed;
        inset: 0;
        background: linear-gradient(180deg, #f4b23e 0%, #e47d31 60%);
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 16px;
        z-index: 100;
      }

      .rotate-msg p {
        font-family: "Chalkboard SE", "Comic Sans MS", cursive;
        font-size: clamp(18px, 4vw, 28px);
        color: var(--white);
        -webkit-text-stroke: 1px var(--ocean-deep);
        text-align: center;
        padding: 0 20px;
      }

      @media (orientation: landscape) and (max-width: 926px) {
        .wrap,
        .overlay {
          display: none;
        }
        .rotate-msg {
          display: flex;
        }
      }

      @media (orientation: portrait) {
        .rotate-msg {
          display: none;
        }
      }

      /* win overlay — uses normal flow so it has height */
      .overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(11, 61, 58, 0.72);
        align-items: center;
        justify-content: center;
        z-index: 50;
        padding: 20px;
      }
      .overlay.show {
        display: flex;
      }
      .win-card {
        background: var(--white);
        border-radius: 24px;
        padding: clamp(20px, 5vw, 36px);
        text-align: center;
        max-width: 360px;
        width: 100%;
        box-shadow: 0 10px 0 rgba(0, 0, 0, 0.15);
        border: 4px solid var(--sun);
      }
      .win-card h2 {
        font-family: "Chalkboard SE", "Comic Sans MS", cursive;
        color: var(--coral);
        -webkit-text-stroke: 1px var(--ocean-deep);
        font-size: clamp(22px, 5.5vw, 30px);
        margin: 0 0 8px;
      }
      .win-card p {
        font-weight: bold;
        color: var(--ocean-deep);
        margin-bottom: 16px;
      }
      .win-emojis {
        font-size: 32px;
        margin-bottom: 8px;
      }
    </style>
  </head>
  <body>
    <div class="rotate-msg">
      <p>🔄 Please rotate your device to portrait mode!</p>
    </div>
    <div class="sun"></div>
    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>

    <div class="wrap">
      <div class="header">
        <a class="reset-btn" href="index.html">⬅️ Back</a>
        <h1>Unit 20</h1>
        <button class="reset-btn" id="resetBtn">Play Again 🏔️</button>
      </div>

      <div class="grid" id="grid"></div>
    </div>

    <div class="overlay" id="overlay">
      <div class="win-card">
        <div class="win-emojis">🏔️ Well Done! 🏔️</div>
        <h2>You found all the pairs!</h2>

        <p id="winStats">Adventure Island</p>
        <button class="reset-btn" id="playAgainBtn">Play Again 🏔️</button>
      </div>
    </div>

    <script>
      /* ---- PAIRS — replace with your real image paths / words ---- */
      const PAIRS = [
        { word: "I put on my boots", word2: "in the morning." },
        { word: "I'm drinking", word2: "green tea." },
        { word: "I always do", word2: "my homework." },
        { word: "I'm going to", word2: "stay in a hotel." },
        { word: "I'm not going", word2: "to study tomorrow." },
        { word: "I watched TV", word2: "yesterday." },
        { word: "I went", word2: "to Nagasaki last week." },
        { word: "I brush my teeth", word2: "twice a day." },
      ];
      /* ---- audio ---- */
      let audioCtx = null;
      function getCtx() {
        if (!audioCtx)
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        return audioCtx;
      }
      function playTone(freq, startTime, duration, gainPeak) {
        const ctx = getCtx();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = "triangle";
        osc.frequency.value = freq;
        osc.connect(gain);
        gain.connect(ctx.destination);
        gain.gain.setValueAtTime(0, startTime);
        gain.gain.linearRampToValueAtTime(gainPeak, startTime + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
        osc.start(startTime);
        osc.stop(startTime + duration + 0.02);
      }
      function playMatchJingle() {
        const ctx = getCtx(),
          now = ctx.currentTime;
        [523.25, 659.25, 783.99, 1046.5].forEach((f, i) =>
          playTone(f, now + i * 0.09, 0.22, 0.22),
        );
      }
      function playWrongSound() {
        const ctx = getCtx(),
          now = ctx.currentTime;
        playTone(220, now, 0.18, 0.12);
        playTone(196, now + 0.08, 0.18, 0.1);
      }
      function playWinFanfare() {
        const ctx = getCtx(),
          now = ctx.currentTime;
        [523.25, 523.25, 659.25, 783.99, 1046.5, 1318.51].forEach((f, i) =>
          playTone(f, now + [0, 0.15, 0.3, 0.45, 0.6, 0.8][i], 0.3, 0.22),
        );
      }

      /* ---- game state ---- */
      let deck = [],
        flippedCards = [],
        matches = 0,
        tries = 0,
        locked = false;

      function buildDeck() {
        let cards = [];
        PAIRS.forEach((p, idx) => {
          cards.push({ pairId: idx, type: "word", value: p.word });
          cards.push({ pairId: idx, type: "word2", value: p.word2 });
        });
        for (let i = cards.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [cards[i], cards[j]] = [cards[j], cards[i]];
        }
        return cards;
      }

      function render() {
        const grid = document.getElementById("grid");
        grid.innerHTML = "";
        deck.forEach((card, i) => {
          const el = document.createElement("div");
          el.className = "card";
          el.dataset.index = i;

          const inner = document.createElement("div"); // ← was missing
          inner.className = "card-inner";

          const back = document.createElement("div");
          back.className = "face face-back";
          back.textContent = i + 1;

          const front = document.createElement("div");
          front.className = "face face-front";

          const span = document.createElement("div");
          span.className = "word";
          span.textContent = card.value;
          front.appendChild(span);

          inner.appendChild(back); // ← only once
          inner.appendChild(front);
          el.appendChild(inner);
          el.addEventListener("click", () => onCardClick(el, card));
          grid.appendChild(el);
        });
      }

      function onCardClick(el, card) {
        getCtx();
        if (locked) return;
        if (locked) return;
        if (
          el.classList.contains("flipped") ||
          el.classList.contains("matched")
        )
          return;
        if (flippedCards.length === 2) return;

        el.classList.add("flipped");
        flippedCards.push({ el, card });

        if (flippedCards.length === 2) {
          tries++;

          locked = true;
          const [a, b] = flippedCards;
          if (a.card.pairId === b.card.pairId) {
            setTimeout(() => {
              a.el.classList.add("matched");
              b.el.classList.add("matched");
              spawnSparkles(a.el);
              spawnSparkles(b.el);
              playMatchJingle();
              matches++;

              flippedCards = [];
              locked = false;
              if (matches === PAIRS.length) setTimeout(showWin, 600);
            }, 350);
          } else {
            setTimeout(() => {
              a.el.classList.add("wrong");
              b.el.classList.add("wrong");
              playWrongSound();
            }, 250);
            setTimeout(() => {
              a.el.classList.remove("flipped", "wrong");
              b.el.classList.remove("flipped", "wrong");
              flippedCards = [];
              locked = false;
            }, 1000);
          }
        }
      }

      function spawnSparkles(el) {
        const emojis = ["✨", "🌟", "🐚", "⭐"];
        for (let i = 0; i < 5; i++) {
          const s = document.createElement("div");
          s.className = "sparkle";
          s.textContent = emojis[Math.floor(Math.random() * emojis.length)];
          const angle = Math.random() * Math.PI * 2;
          const dist = 35 + Math.random() * 25;
          s.style.setProperty("--dx", `${Math.cos(angle) * dist}px`);
          s.style.setProperty("--dy", `${Math.sin(angle) * dist}px`);
          s.style.left = "50%";
          s.style.top = "50%";
          el.appendChild(s);
          setTimeout(() => s.remove(), 950);
        }
      }

      function showWin() {
        document.getElementById("winStats").textContent =
          `You matched all ${PAIRS.length} pairs in ${tries} tries!`;
        document.getElementById("overlay").classList.add("show");
        playWinFanfare();
      }
      let voiceOn = true;

      function newGame() {
        matches = 0;
        tries = 0;
        flippedCards = [];
        locked = false;

        document.getElementById("overlay").classList.remove("show");
        deck = buildDeck();
        render();
      }

      document.getElementById("resetBtn").addEventListener("click", newGame);
      document
        .getElementById("playAgainBtn")
        .addEventListener("click", newGame);
      newGame();
    </script>
  </body>
</html>
